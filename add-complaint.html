<!DOCTYPE html>
<html>
<head>
  <title>Add Complaint</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 transition duration-300">

<script>
let user = JSON.parse(localStorage.getItem("loggedInUser"));
if(!user){ window.location.href="login.html"; }
</script>

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-gradient-to-b from-blue-700 to-indigo-800 text-white hidden md:flex flex-col p-5">
    <h2 class="text-2xl font-bold mb-8">🎓 Student Panel</h2>

    <nav class="space-y-4">
      <a href="student-dashboard.html" class="block hover:bg-blue-600 p-2 rounded">Dashboard</a>
      <a href="#" class="block bg-blue-600 p-2 rounded">Add Complaint</a>
      <a href="index.html" class="block hover:bg-blue-600 p-2 rounded">Home</a>
    </nav>

    <div class="mt-auto pt-6 border-t border-blue-400">
      <button onclick="toggleDarkMode()" 
        class="w-full bg-gray-200 text-black py-2 rounded hover:bg-gray-300">
        🌙 Toggle Dark Mode
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1">

    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 shadow p-4 flex justify-between items-center">
      <h1 class="text-xl font-bold dark:text-white">Add New Complaint</h1>
      <a href="student-dashboard.html"
         class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
         ⬅ Back
      </a>
    </header>

    <!-- Form Section -->
    <main class="p-6 flex justify-center">

      <div class="bg-white dark:bg-gray-800 w-full max-w-2xl rounded-xl shadow-xl p-8 transform hover:shadow-2xl transition duration-300">

        <h2 class="text-2xl font-semibold mb-6 dark:text-white">
          📝 Submit Complaint
        </h2>

        <form id="complaintForm" class="space-y-6">

          <!-- Title -->
          <div>
            <label class="block mb-2 font-medium dark:text-white">Title</label>
            <input type="text" id="title" required
              class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none dark:bg-gray-700 dark:text-white">
          </div>

          <!-- Department -->
          <div>
            <label class="block mb-2 font-medium dark:text-white">Department</label>
            <select id="department" required
              class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none dark:bg-gray-700 dark:text-white">
              <option value="">Select Department</option>
              <option>Hostel</option>
              <option>Library</option>
              <option>WiFi</option>
              <option>Classroom</option>
              <option>Transport</option>
            </select>
          </div>

          <!-- Description -->
          <div>
            <label class="block mb-2 font-medium dark:text-white">Description</label>
            <textarea id="description" rows="4" required
              class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none dark:bg-gray-700 dark:text-white"></textarea>
          </div>

          <!-- Buttons -->
          <div class="flex justify-between items-center pt-4">
            <button type="submit"
              class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transform hover:scale-105 transition duration-200">
              Submit
            </button>

            <a href="student-dashboard.html"
              class="bg-gray-400 text-white px-6 py-3 rounded-lg hover:bg-gray-500 transition">
              Cancel
            </a>
          </div>

        </form>

      </div>

    </main>

  </div>

</div>

<script>
document.getElementById("complaintForm").addEventListener("submit", function(e){
  e.preventDefault();

  let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

  complaints.push({
    complaintId: Date.now(),
    studentId: user.id,
    title: title.value,
    department: department.value,
    description: description.value,
    status: "Pending",
    date: new Date().toLocaleDateString()
  });

  localStorage.setItem("complaints", JSON.stringify(complaints));

  alert("Complaint Submitted Successfully!");
  window.location.href="student-dashboard.html";
});

function toggleDarkMode(){
  document.documentElement.classList.toggle("dark");
}
</script>

</body>
</html>
