<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 transition duration-300">

<script>
let user = JSON.parse(localStorage.getItem("loggedInUser"));
if(!user){ window.location.href="login.html"; }
</script>

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-gradient-to-b from-blue-700 to-indigo-800 text-white hidden md:flex flex-col p-5">
    <h2 class="text-2xl font-bold mb-8">🎓 Student Panel</h2>

    <nav class="space-y-4">
      <a href="#" class="block hover:bg-blue-600 p-2 rounded">Dashboard</a>
      <a href="add-complaint.html" class="block hover:bg-blue-600 p-2 rounded">Add Complaint</a>
      <a href="index.html" class="block hover:bg-blue-600 p-2 rounded">Home</a>
    </nav>

    <div class="mt-auto pt-6 border-t border-blue-400">
      <button onclick="toggleDarkMode()" 
        class="w-full bg-gray-200 text-black py-2 rounded hover:bg-gray-300">
        🌙 Toggle Dark Mode
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1">

    <!-- Top Navbar -->
    <header class="bg-white dark:bg-gray-800 shadow flex justify-between items-center p-4 transition duration-300">

      <button class="md:hidden bg-blue-600 text-white px-3 py-1 rounded"
        onclick="toggleSidebar()">☰</button>

      <h1 class="text-xl font-bold dark:text-white">Dashboard</h1>

      <!-- Profile Dropdown -->
      <div class="relative">
        <button onclick="toggleDropdown()" 
          class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
          👤 <span id="studentName"></span>
        </button>

        <div id="dropdownMenu" 
          class="hidden absolute right-0 mt-2 w-40 bg-white dark:bg-gray-700 shadow-lg rounded-lg overflow-hidden transition duration-300">
          <a href="index.html" class="block px-4 py-2 hover:bg-gray-200 dark:hover:bg-gray-600 dark:text-white">Home</a>
          <button onclick="logout()" 
            class="w-full text-left px-4 py-2 hover:bg-red-500 hover:text-white dark:text-white">
            Logout
          </button>
        </div>
      </div>

    </header>

    <!-- Dashboard Content -->
    <main class="p-6">

      <!-- Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">

        <div class="bg-blue-600 text-white p-6 rounded-xl shadow-lg transform hover:scale-105 transition">
          <h4>Total Complaints</h4>
          <h2 class="text-3xl font-bold mt-2" id="totalCount">0</h2>
        </div>

        <div class="bg-orange-500 text-white p-6 rounded-xl shadow-lg transform hover:scale-105 transition">
          <h4>Pending</h4>
          <h2 class="text-3xl font-bold mt-2" id="pendingCount">0</h2>
        </div>

        <div class="bg-green-600 text-white p-6 rounded-xl shadow-lg transform hover:scale-105 transition">
          <h4>Resolved</h4>
          <h2 class="text-3xl font-bold mt-2" id="resolvedCount">0</h2>
        </div>

      </div>

      <!-- Table -->
      <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 transition duration-300">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-semibold dark:text-white">My Complaints</h3>
          <a href="add-complaint.html"
             class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
             + New Complaint
          </a>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead>
              <tr class="bg-gray-200 dark:bg-gray-700 dark:text-white">
                <th class="p-3">Title</th>
                <th class="p-3">Department</th>
                <th class="p-3">Status</th>
                <th class="p-3">Date</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

    </main>

  </div>

</div>

<script>
document.getElementById("studentName").innerText = user.name;

let complaints = JSON.parse(localStorage.getItem("complaints")) || [];
let myComplaints = complaints.filter(c => c.studentId === user.id);

let pending = 0;
let resolved = 0;

myComplaints.forEach(c => {

  if(c.status==="Pending") pending++;
  if(c.status==="Resolved") resolved++;

  tableBody.innerHTML += `
  <tr class="border-b dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
    <td class="p-3 dark:text-white">${c.title}</td>
    <td class="p-3 dark:text-white">${c.department}</td>
    <td class="p-3">
      <span class="px-3 py-1 rounded-full text-white
        ${c.status==="Pending" ? "bg-orange-500" : ""}
        ${c.status==="Resolved" ? "bg-green-600" : ""}
        ${c.status==="In Progress" ? "bg-blue-600" : ""}">
        ${c.status}
      </span>
    </td>
    <td class="p-3 dark:text-white">${c.date}</td>
  </tr>`;
});

document.getElementById("totalCount").innerText = myComplaints.length;
document.getElementById("pendingCount").innerText = pending;
document.getElementById("resolvedCount").innerText = resolved;

function logout(){
  localStorage.removeItem("loggedInUser");
  window.location.href="login.html";
}

function toggleDropdown(){
  document.getElementById("dropdownMenu").classList.toggle("hidden");
}

function toggleDarkMode(){
  document.documentElement.classList.toggle("dark");
}

function toggleSidebar(){
  document.querySelector("aside").classList.toggle("hidden");
}
</script>

</body>
</html>
